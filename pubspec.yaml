name: setota_app
description: "Setota Customer App - flower & gift delivery in Ethiopia"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.3

  # Network
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1
  web_socket_channel: ^3.0.0

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase
  firebase_core: ^3.2.0
  firebase_messaging: ^15.0.4
  firebase_crashlytics: ^4.0.3

  # Utilities
  uuid: ^4.2.1
  intl: ^0.19.0
  url_launcher: ^6.2.6
  image_picker: ^1.1.1
  cached_network_image: ^3.3.1
  flutter_local_notifications: ^17.1.2
  device_info_plus: ^10.1.0
  share_plus: ^10.0.2

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1

  # Environment
  flutter_dotenv: ^5.1.0

  # Payment WebViews
  webview_flutter: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.14.1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
    - .env.production
