name: Android Build & Google Play Deploy

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true

      - name: Create Android project files
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android --org com.setota --project-name setota_app .
          fi

      - name: Configure Android signing and desugaring
        run: |
          cat > /tmp/patch_gradle.py << 'SCRIPT'
          import os, sys, re
          p = "android/app/build.gradle.kts"
          if not os.path.exists(p):
              print("ERROR: build.gradle.kts not found")
              sys.exit(1)
          with open(p) as f:
              c = f.read()

          print("=== ORIGINAL build.gradle.kts ===")
          print(c)
          print("=== END ORIGINAL ===")

          # Fix namespace and applicationId
          c = c.replace('namespace = "com.setota.setota_app"', 'namespace = "com.setota.app"')
          c = c.replace('applicationId = "com.setota.setota_app"', 'applicationId = "com.setota.app"')

          # Add signing config block if not present
          sb = '\n    signingConfigs {\n        create("release") {\n            storeFile = file(System.getenv("KEYSTORE_PATH") ?: "/dev/null")\n            storePassword = System.getenv("KEYSTORE_PASSWORD") ?: ""\n            keyAlias = System.getenv("KEY_ALIAS") ?: ""\n            keyPassword = System.getenv("KEY_PASSWORD") ?: ""\n        }\n    }\n'
          if "signingConfigs" not in c:
              c = c.replace("android {", "android {" + sb, 1)
              print("Added signingConfigs block")

          # Force release buildType to use release signing (regex for flexible whitespace)
          old_signing = re.search(r'signingConfig\s*=\s*signingConfigs\.getByName\("debug"\)', c)
          if old_signing:
              c = re.sub(
                  r'signingConfig\s*=\s*signingConfigs\.getByName\("debug"\)',
                  'signingConfig = signingConfigs.getByName("release")',
                  c
              )
              print("Replaced debug signing with release signing")
          else:
              # If no signing config line exists in release block, add it
              release_match = re.search(r'(release\s*\{)', c)
              if release_match:
                  c = c[:release_match.end()] + '\n            signingConfig = signingConfigs.getByName("release")' + c[release_match.end():]
                  print("Injected release signing config into release block")
              else:
                  print("WARNING: No release buildType found")

          # Enable core library desugaring
          if "isCoreLibraryDesugaringEnabled" not in c:
              if "compileOptions" in c:
                  c = c.replace("compileOptions {", "compileOptions {\n        isCoreLibraryDesugaringEnabled = true")
              else:
                  c = c.replace("android {", "android {\n    compileOptions {\n        isCoreLibraryDesugaringEnabled = true\n        sourceCompatibility = JavaVersion.VERSION_1_8\n        targetCompatibility = JavaVersion.VERSION_1_8\n    }\n", 1)

          # Add desugaring dependency
          if "desugar_jdk_libs" not in c:
              if "dependencies {" in c:
                  c = c.replace("dependencies {", 'dependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")')
              else:
                  c += '\ndependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")\n}\n'

          with open(p, "w") as f:
              f.write(c)

          print("\n=== PATCHED build.gradle.kts ===")
          with open(p) as f:
              print(f.read())
          print("=== END PATCHED ===")
          SCRIPT
          python3 /tmp/patch_gradle.py

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Create environment file
        run: |
          cat > .env.production << 'EOF'
          API_BASE_URL=https://setota-emaagsasfbd6d4ec.uaenorth-01.azurewebsites.net/api/v1
          WS_URL=wss://setota-emaagsasfbd6d4ec.uaenorth-01.azurewebsites.net/api/v1/ws/customer/websocket
          ENVIRONMENT=production
          EOF
          sed -i 's/^          //' .env.production

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs || true

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/keystore.jks

      - name: Build App Bundle
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build appbundle --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: customer-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 14

      - name: Deploy to Google Play (Internal Testing)
        continue-on-error: true
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.setota.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: draft
