name: Android Build & Google Play Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true

      - name: Create Android project files
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android --org com.setota --project-name setota_app .
          fi

      - name: Configure Android signing
        run: |
          # Inject release signing config into build.gradle.kts
          cd android/app
          cat > /tmp/signing_patch.py << 'PYEOF'
          import re, sys
          with open("build.gradle.kts", "r") as f:
              content = f.read()
          # Skip if already configured
          if "signingConfigs" in content:
              print("Signing already configured")
              sys.exit(0)
          # Add signingConfigs block after 'android {'
          signing = '''
    signingConfigs {
        create("release") {
            val keystorePath = System.getenv("KEYSTORE_PATH")
            if (keystorePath != null) {
                storeFile = file(keystorePath)
                storePassword = System.getenv("KEYSTORE_PASSWORD")
                keyAlias = System.getenv("KEY_ALIAS")
                keyPassword = System.getenv("KEY_PASSWORD")
            }
        }
    }
'''
          content = content.replace("android {\n", "android {\n" + signing, 1)
          # Use release signing in release buildType
          content = content.replace(
              'signingConfig = signingConfigs.getByName("debug")',
              'signingConfig = if (System.getenv("KEYSTORE_PATH") != null) signingConfigs.getByName("release") else signingConfigs.getByName("debug")'
          )
          # Set applicationId and namespace
          content = content.replace('namespace = "com.setota.setota_app"', 'namespace = "com.setota.app"')
          content = content.replace('applicationId = "com.setota.setota_app"', 'applicationId = "com.setota.app"')
          with open("build.gradle.kts", "w") as f:
              f.write(content)
          print("Signing config injected")
          PYEOF
          python3 /tmp/signing_patch.py
          cd ../..

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/keystore.jks

      - name: Build App Bundle
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build appbundle --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: customer-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 14

      - name: Deploy to Google Play (Internal Testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.setota.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: draft
